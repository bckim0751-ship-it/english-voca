<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>비즈니스 영단어</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="top-logo">📗 비즈니스 영단어</div>
        <div class="top-streak">
          <span class="flame">🔥</span>
          <span id="streak-count">0</span>
        </div>
      </div>
    </header>
    <main class="main-content">
      <!-- 오늘의 단어 -->
      <section id="tab-today" class="tab-pane active">
        <div class="section-head">
          <div>
            <p class="section-label">TODAY</p>
            <h2 class="section-title" id="today-date"></h2>
          </div>
          <div class="day-progress">
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle class="dp-bg" cx="26" cy="26" r="21"/>
              <circle class="dp-fill" id="dp-fill" cx="26" cy="26" r="21"/>
            </svg>
            <span class="dp-text" id="dp-text">0/10</span>
          </div>
        </div>
        <div class="step-dots" id="step-dots"></div>
        <div class="card-wrap">
          <div class="word-card" id="word-card" onclick="flipCard()">
            <div class="wc-inner" id="wc-inner">
              <div class="wc-front">
                <span class="wc-badge" id="wc-badge"></span>
                <p class="wc-pos" id="wc-pos"></p>
                <h1 class="wc-word" id="wc-word"></h1>
                <p class="wc-tap">탭해서 뜻 확인 👆</p>
              </div>
              <div class="wc-back">
                <p class="wc-b-en" id="wc-b-en"></p>
                <p class="wc-b-ko" id="wc-b-ko"></p>
                <p class="wc-b-def" id="wc-b-def"></p>
                <div class="wc-b-ex">
                  <span class="ex-chip">예문</span>
                  <p id="wc-b-example"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="know-btns" id="know-btns">
          <button class="kb-again" onclick="markWord('again')"><span class="kb-icon">↩</span> 다시</button>
          <button class="kb-know" onclick="markWord('know')"><span class="kb-icon">✓</span> 알아요</button>
        </div>
        <div class="card-nav">
          <button class="cn-btn" onclick="prevCard()">‹</button>
          <span class="cn-idx" id="cn-idx">1 / 10</span>
          <button class="cn-btn" onclick="nextCard()">›</button>
        </div>
        <div class="done-banner" id="done-banner">
          <p>🎉 오늘 단어 완료!</p>
          <button onclick="goQuiz()">퀴즈 도전 →</button>
        </div>
      </section>
      <!-- 퀴즈 -->
      <section id="tab-quiz" class="tab-pane">
        <div id="q-intro" class="q-intro">
          <div class="qi-icon">🎯</div>
          <h2>오늘의 퀴즈</h2>
          <p>10문제 · 3가지 유형</p>
          <div class="qi-types">
            <span class="qi-chip">영→한</span>
            <span class="qi-chip">한→영</span>
            <span class="qi-chip">빈칸 채우기</span>
          </div>
          <button class="btn-green" onclick="startQuiz()">시작하기</button>
        </div>
        <div id="q-play" style="display:none">
          <div class="qp-head">
            <div class="qp-meta">
              <span class="qp-type" id="qp-type"></span>
              <span class="qp-num" id="qp-num">1/10</span>
            </div>
            <div class="qp-bar"><div class="qp-bar-fill" id="qp-bar-fill"></div></div>
          </div>
          <div class="q-card" id="q-card">
            <p class="q-hint" id="q-hint"></p>
            <p class="q-main" id="q-main"></p>
          </div>
          <div class="q-opts" id="q-opts"></div>
        </div>
        <div id="q-result" style="display:none">
          <div class="qr-score">
            <span id="qr-num">0</span><span class="qr-den">/10</span>
          </div>
          <h2 id="qr-msg"></h2>
          <p class="qr-sub" id="qr-sub"></p>
          <div class="qr-list" id="qr-list"></div>
          <div class="qr-btns">
            <button class="btn-outline" onclick="startQuiz()">다시 풀기</button>
            <button class="btn-green" onclick="switchTab('stats')">결과 보기</button>
          </div>
        </div>
      </section>
      <!-- 단어장 -->
      <section id="tab-words" class="tab-pane">
        <div class="wl-head">
          <h2>단어장 <span class="wl-cnt" id="wl-cnt"></span></h2>
          <div class="wl-filters">
            <button class="flt active" onclick="setLv('all',this)">전체</button>
            <button class="flt" onclick="setLv(1,this)">기초</button>
            <button class="flt" onclick="setLv(2,this)">중급</button>
            <button class="flt" onclick="setLv(3,this)">고급</button>
          </div>
        </div>
        <div class="wl-list" id="wl-list"></div>
      </section>
      <!-- 통계 -->
      <section id="tab-stats" class="tab-pane">
        <h2 class="st-title">학습 통계</h2>
        <div class="st-grid">
          <div class="st-card"><div class="st-ico">📅</div><div class="st-val" id="st-days">0</div><div class="st-lbl">학습일</div></div>
          <div class="st-card"><div class="st-ico">📖</div><div class="st-val" id="st-words">0</div><div class="st-lbl">누적 단어</div></div>
          <div class="st-card"><div class="st-ico">🔥</div><div class="st-val" id="st-streak">0</div><div class="st-lbl">연속 학습</div></div>
          <div class="st-card"><div class="st-ico">🎯</div><div class="st-val" id="st-acc">-</div><div class="st-lbl">정답률</div></div>
        </div>
        <div class="st-hist">
          <h3>퀴즈 기록</h3>
          <div id="st-hist-list"></div>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <button class="bn-btn active" data-tab="today" onclick="switchTab('today',this)">
        <span class="bn-ico">📚</span><span class="bn-lbl">학습</span>
      </button>
      <button class="bn-btn" data-tab="quiz" onclick="switchTab('quiz',this)">
        <span class="bn-ico">🎯</span><span class="bn-lbl">퀴즈</span>
      </button>
      <button class="bn-btn" data-tab="words" onclick="switchTab('words',this)">
        <span class="bn-ico">📋</span><span class="bn-lbl">단어장</span>
      </button>
      <button class="bn-btn" data-tab="stats" onclick="switchTab('stats',this)">
        <span class="bn-ico">📊</span><span class="bn-lbl">통계</span>
      </button>
    </nav>
  </div>
  <script src="js/words.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

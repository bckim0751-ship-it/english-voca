<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>비즈니스 영단어</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div id="app">

    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="top-logo">📗 비즈니스 영단어</div>
        <div class="top-streak">
          <span class="flame">🔥</span>
          <span id="streak-count">0</span>
        </div>
      </div>
    </header>

    <main class="main-content">

      <!-- ① 오늘의 학습 -->
      <section id="tab-today" class="tab-pane active">
        <div class="section-head">
          <div>
            <p class="section-label">TODAY</p>
            <h2 class="section-title" id="today-date"></h2>
          </div>
          <div class="day-progress">
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle class="dp-bg" cx="26" cy="26" r="21"/>
              <circle class="dp-fill" id="dp-fill" cx="26" cy="26" r="21"/>
            </svg>
            <span class="dp-text" id="dp-text">0/10</span>
          </div>
        </div>

        <div class="step-dots" id="step-dots"></div>

        <!-- Fill-in-blank card -->
        <div class="learn-card" id="learn-card">
          <div class="lc-hint">
            <span class="lc-hint-label">🇰🇷 힌트</span>
            <p class="lc-korean" id="lc-korean"></p>
          </div>
          <div class="lc-sentence-wrap">
            <p class="lc-instruction">빈칸에 알맞은 영어 단어를 고르세요</p>
            <p class="lc-sentence" id="lc-sentence"></p>
          </div>
        </div>

        <!-- Options -->
        <div class="learn-opts" id="learn-opts"></div>

        <!-- Answer feedback -->
        <div class="learn-feedback" id="learn-feedback" style="display:none">
          <div class="lf-word" id="lf-word"></div>
          <div class="lf-def" id="lf-def"></div>
          <button class="btn-next" id="btn-next" onclick="nextLearnCard()">다음 →</button>
        </div>

        <!-- Done banner -->
        <div class="done-banner" id="done-banner">
          <p>🎉 오늘 학습 완료!</p>
          <button onclick="goQuiz()">퀴즈 도전 →</button>
        </div>
      </section>

      <!-- ② 퀴즈 -->
      <section id="tab-quiz" class="tab-pane">
        <div id="q-intro" class="q-intro">
          <div class="qi-icon">🎯</div>
          <h2>오늘의 퀴즈</h2>
          <p>20문제 · 빈칸 채우기</p>
          <div class="qi-types">
            <span class="qi-chip">🇰🇷 한국어 문장 힌트</span>
            <span class="qi-chip">영어 빈칸 채우기</span>
          </div>
          <button class="btn-green" onclick="startQuiz()">시작하기</button>
        </div>

        <div id="q-play" style="display:none">
          <div class="qp-head">
            <div class="qp-meta">
              <span class="qp-type" id="qp-type"></span>
              <span class="qp-num" id="qp-num">1/20</span>
            </div>
            <div class="qp-bar"><div class="qp-bar-fill" id="qp-bar-fill"></div></div>
          </div>
          <div class="q-card" id="q-card">
            <p class="q-hint" id="q-hint"></p>
            <p class="q-main" id="q-main"></p>
          </div>
          <div class="q-opts" id="q-opts"></div>
        </div>

        <div id="q-result" style="display:none">
          <div class="qr-score">
            <span id="qr-num">0</span><span class="qr-den">/20</span>
          </div>
          <h2 id="qr-msg"></h2>
          <p class="qr-sub" id="qr-sub"></p>
          <div class="qr-list" id="qr-list"></div>
          <div class="qr-btns">
            <button class="btn-outline" onclick="startQuiz()">다시 풀기</button>
            <button class="btn-green" onclick="switchTab('stats')">결과 보기</button>
          </div>
        </div>
      </section>

      <!-- ③ 단어장 -->
      <section id="tab-words" class="tab-pane">
        <div class="wl-head">
          <h2>단어장 <span class="wl-cnt" id="wl-cnt"></span></h2>
          <div class="wl-filters">
            <button class="flt active" onclick="setLv('all',this)">전체</button>
            <button class="flt" onclick="setLv(1,this)">기초</button>
            <button class="flt" onclick="setLv(2,this)">중급</button>
            <button class="flt" onclick="setLv(3,this)">고급</button>
          </div>
        </div>
        <div class="wl-list" id="wl-list"></div>
      </section>

      <!-- ④ 통계 -->
      <section id="tab-stats" class="tab-pane">
        <h2 class="st-title">학습 통계</h2>
        <div class="st-grid">
          <div class="st-card">
            <div class="st-ico">📅</div>
            <div class="st-val" id="st-days">0</div>
            <div class="st-lbl">학습일</div>
          </div>
          <div class="st-card">
            <div class="st-ico">📖</div>
            <div class="st-val" id="st-words">0</div>
            <div class="st-lbl">누적 단어</div>
          </div>
          <div class="st-card">
            <div class="st-ico">🔥</div>
            <div class="st-val" id="st-streak">0</div>
            <div class="st-lbl">연속 학습</div>
          </div>
          <div class="st-card">
            <div class="st-ico">🎯</div>
            <div class="st-val" id="st-acc">-</div>
            <div class="st-lbl">정답률</div>
          </div>
        </div>
        <div class="st-hist">
          <h3>퀴즈 기록</h3>
          <div id="st-hist-list"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="bn-btn active" data-tab="today" onclick="switchTab('today',this)">
        <span class="bn-ico">📚</span>
        <span class="bn-lbl">학습</span>
      </button>
      <button class="bn-btn" data-tab="quiz" onclick="switchTab('quiz',this)">
        <span class="bn-ico">🎯</span>
        <span class="bn-lbl">퀴즈</span>
      </button>
      <button class="bn-btn" data-tab="words" onclick="switchTab('words',this)">
        <span class="bn-ico">📋</span>
        <span class="bn-lbl">단어장</span>
      </button>
      <button class="bn-btn" data-tab="stats" onclick="switchTab('stats',this)">
        <span class="bn-ico">📊</span>
        <span class="bn-lbl">통계</span>
      </button>
    </nav>

  </div>
  <script src="js/words.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>

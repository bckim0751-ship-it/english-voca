<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>비즈니스 영단어</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <div id="app">

    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="top-logo">📗 비즈니스 영단어</div>
        <div class="top-streak">
          <span>🔥</span>
          <span id="streak-count">0</span>
        </div>
      </div>
    </header>

    <main class="main-content">

      <!-- 학습 -->
      <section id="tab-today" class="tab-pane active">
        <div class="section-head">
          <div>
            <p class="section-label">TODAY</p>
            <h2 class="section-title" id="today-date"></h2>
          </div>
          <div class="day-progress">
            <svg width="50" height="50" viewBox="0 0 52 52">
              <circle class="dp-bg" cx="26" cy="26" r="21"/>
              <circle class="dp-fill" id="dp-fill" cx="26" cy="26" r="21"/>
            </svg>
            <span class="dp-text" id="dp-text">0/20</span>
          </div>
        </div>

        <div class="step-dots" id="step-dots"></div>

        <!-- 빈칸 채우기 카드 -->
        <div class="learn-card" id="learn-card">
          <div class="lc-hint">
            <span class="lc-hint-label">🇰🇷 한국어</span>
            <p class="lc-korean" id="lc-korean"></p>
          </div>
          <div class="lc-sentence-wrap">
            <p class="lc-instruction">빈칸에 알맞은 영어 단어를 고르세요</p>
            <p class="lc-sentence" id="lc-sentence"></p>
          </div>
        </div>

        <div class="learn-opts" id="learn-opts"></div>

        <div class="learn-feedback" id="learn-feedback" style="display:none">
          <div class="lf-word" id="lf-word"></div>
          <div class="lf-def" id="lf-def"></div>
          <button class="btn-next" id="btn-next" onclick="nextLearnCard()">다음 →</button>
        </div>

        <!-- 완료 화면 -->
        <div class="result-screen" id="result-screen" style="display:none">
          <div class="rs-score">
            <span id="rs-num">0</span><span class="rs-den">/20</span>
          </div>
          <h2 id="rs-msg"></h2>
          <p class="rs-sub" id="rs-sub"></p>
          <div class="rs-list" id="rs-list"></div>
          <button class="btn-green" onclick="restartLearn()">다시 풀기</button>
        </div>
      </section>

      <!-- 단어장 -->
      <section id="tab-words" class="tab-pane">
        <div class="wl-head">
          <h2>단어장 <span class="wl-cnt" id="wl-cnt"></span></h2>
          <div class="wl-filters">
            <button class="flt active" onclick="setLv('all',this)">전체</button>
            <button class="flt" onclick="setLv(1,this)">기초</button>
            <button class="flt" onclick="setLv(2,this)">중급</button>
            <button class="flt" onclick="setLv(3,this)">고급</button>
          </div>
        </div>
        <div class="wl-list" id="wl-list"></div>
      </section>

      <!-- 통계 -->
      <section id="tab-stats" class="tab-pane">
        <h2 class="st-title">학습 통계</h2>
        <div class="st-grid">
          <div class="st-card"><div class="st-ico">📅</div><div class="st-val" id="st-days">0</div><div class="st-lbl">학습일</div></div>
          <div class="st-card"><div class="st-ico">📖</div><div class="st-val" id="st-words">0</div><div class="st-lbl">누적 단어</div></div>
          <div class="st-card"><div class="st-ico">🔥</div><div class="st-val" id="st-streak">0</div><div class="st-lbl">연속 학습</div></div>
          <div class="st-card"><div class="st-ico">🎯</div><div class="st-val" id="st-acc">-</div><div class="st-lbl">정답률</div></div>
        </div>
        <div class="st-hist">
          <h3>학습 기록</h3>
          <div id="st-hist-list"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="bn-btn active" data-tab="today" onclick="switchTab('today')">
        <span class="bn-ico">📚</span><span class="bn-lbl">학습</span>
      </button>
      <button class="bn-btn" data-tab="words" onclick="switchTab('words')">
        <span class="bn-ico">📋</span><span class="bn-lbl">단어장</span>
      </button>
      <button class="bn-btn" data-tab="stats" onclick="switchTab('stats')">
        <span class="bn-ico">📊</span><span class="bn-lbl">통계</span>
      </button>
    </nav>

  </div>
  <script src="js/words.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
